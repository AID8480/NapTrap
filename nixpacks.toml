[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "jdk17", "nodejs_20"]

[phases.install]
cmds = [
  "python3.11 -m venv /app/venv",
  "/app/venv/bin/pip install -r requirements.txt",
  "javac HRVCalculator.java",
  "cd frontend && npm install && npm run build"
]

[start]
cmd = "/app/venv/bin/uvicorn backend.main:app --host 0.0.0.0 --port $PORT --workers 2"
